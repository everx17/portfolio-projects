{% extends "./base.html" %}
{% load bootstrap4 %}

{% block content %}
    <h1>{{count}} search results for user: {{searchterm}}</h1>
    <table>
      {% for result in results %}
      <tr><td><a href="/user/{{result.username}}">{{result.username}}</a></td></tr>
      {% endfor %}
    </table>
{% endblock %}
